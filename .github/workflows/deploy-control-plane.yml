name: Deploy Control Plane
# VPS SSH runs on port 1786; DEPLOY_PORT can override the default.

on:
  push:
    branches:
      - main
    paths:
      - "apps/control-plane/**"
      - ".github/workflows/deploy-control-plane.yml"
      - ".github/workflows/control-plane-ci.yml"
  workflow_dispatch:

jobs:
  verify:
    name: Verify Laravel app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite, redis
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: apps/control-plane/.nvmrc
          cache: npm
          cache-dependency-path: apps/control-plane/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Lint PHP
        run: composer lint

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: composer test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-build
          path: apps/control-plane/public/build
          retention-days: 7

  deploy:
    name: Deploy to ads.mcv.network
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    env:
      CONTROL_PLANE_PATH: ${{ secrets.CONTROL_PLANE_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '1786' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: control-plane-build
          path: apps/control-plane/public/build

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ env.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_KEY DEPLOY_HOST DEPLOY_USER; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::$name is not configured."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error title=Invalid DEPLOY_KEY::DEPLOY_KEY must be an unencrypted OpenSSH private key, including BEGIN/END lines."
            exit 1
          fi
          ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning title=SSH host key scan failed::Continuing with StrictHostKeyChecking disabled for deploy commands."

      - name: Create remote app directory
        run: |
          APP_PATH="${CONTROL_PLANE_PATH:-/var/www/mcv.network/current/apps/control-plane}"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$APP_PATH'"

      - name: Rsync app files
        run: |
          APP_PATH="${CONTROL_PLANE_PATH:-/var/www/mcv.network/current/apps/control-plane}"
          rsync -az --delete \
            --exclude='.env' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            --exclude='database/database.sqlite' \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no" \
            apps/control-plane/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$APP_PATH/"

      - name: Run remote Laravel deploy
        run: |
          APP_PATH="${CONTROL_PLANE_PATH:-/var/www/mcv.network/current/apps/control-plane}"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '$APP_PATH' && \
             mkdir -p storage/app storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache && \
             composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader && \
             if [ ! -f .env ]; then cp .env.example .env; fi && \
             php artisan key:generate --force --ansi && \
             php -r \"\\\$path='.env'; \\\$env=file_get_contents(\\\$path); \\\$env=preg_replace('/^APP_ENV=.*/m', 'APP_ENV=production', \\\$env); \\\$env=preg_replace('/^APP_DEBUG=.*/m', 'APP_DEBUG=false', \\\$env); \\\$env=preg_replace('/^APP_URL=.*/m', 'APP_URL=https://ads.mcv.network', \\\$env); file_put_contents(\\\$path, \\\$env);\" && \
             if grep -q '^DB_CONNECTION=sqlite' .env; then touch database/database.sqlite; fi && \
             php artisan migrate --force && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan queue:restart"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 5
          curl -kfsS https://ads.mcv.network/up
