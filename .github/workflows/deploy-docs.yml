name: Deploy Documentation Site

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Docusaurus docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: apps/docs/build
          retention-days: 7

  deploy:
    name: Deploy to docs.mcv.network
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '1786' }}
      DOCS_DEPLOY_PATH: ${{ secrets.DOCS_DEPLOY_PATH || '/var/www/mcv.network/docs' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: build

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ env.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_KEY DEPLOY_HOST DEPLOY_USER; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::$name is not configured."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error title=Invalid DEPLOY_KEY::DEPLOY_KEY must be an unencrypted OpenSSH private key, including BEGIN/END lines."
            exit 1
          fi
          ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning title=SSH host key scan failed::Continuing with StrictHostKeyChecking disabled for deploy commands."

      - name: Create remote docs directory
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$DOCS_DEPLOY_PATH'"

      - name: Deploy docs files
        run: |
          rsync -az --delete --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no" \
            build/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DOCS_DEPLOY_PATH/"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 5
          curl -fsS https://docs.mcv.network/
