name: Deploy Marketing Site
# VPS SSH runs on port 1786; DEPLOY_PORT can override the default.

on:
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "advertisers/**"
      - "commerce/**"
      - "company/**"
      - "legal/**"
      - "publishers/**"
      - "resources/**"
      - "signup/**"
      - "login/**"
      - "solutions/**"
      - "technology/**"
      - "index.html"
      - "sitemap.html"
      - "logo_MCV_network.png"
      - "build.mjs"
      - ".github/workflows/deploy-marketing.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build static marketing pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Generate static pages
        run: node build.mjs

      - name: Verify auth links target app domain
        run: |
          if grep -R 'href="/signup/\|href="/login/' --include='*.html' .; then
            echo "Found local auth links in static marketing pages."
            exit 1
          fi

      - name: Stage deploy artifact
        run: |
          mkdir -p dist
          cp -R assets advertisers commerce company legal publishers resources signup login solutions technology dist/
          cp index.html sitemap.html logo_MCV_network.png dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-site
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to mcv.network
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: marketing-site
          path: dist

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '1786' }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_KEY DEPLOY_HOST DEPLOY_USER; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::$name is not configured."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error title=Invalid DEPLOY_KEY::DEPLOY_KEY must be an unencrypted OpenSSH private key, including BEGIN/END lines."
            exit 1
          fi
          ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning title=SSH host key scan failed::Continuing with StrictHostKeyChecking disabled for deploy commands."

      - name: Deploy files
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '1786' }}
        run: |
          rsync -az --delete --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Reload Nginx
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '1786' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 5
          curl -fsS https://mcv.network/health
