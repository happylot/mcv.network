name: Deploy Marketing Site

on:
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "advertisers/**"
      - "commerce/**"
      - "company/**"
      - "legal/**"
      - "publishers/**"
      - "resources/**"
      - "signup/**"
      - "login/**"
      - "solutions/**"
      - "technology/**"
      - "index.html"
      - "sitemap.html"
      - "logo_MCV_network.png"
      - "build.mjs"
      - ".github/workflows/deploy-marketing.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build static marketing pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Generate static pages
        run: node build.mjs

      - name: Verify auth links target app domain
        run: |
          if grep -R 'href="/signup/\|href="/login/' --include='*.html' .; then
            echo "Found local auth links in static marketing pages."
            exit 1
          fi

      - name: Stage deploy artifact
        run: |
          mkdir -p dist
          cp -R assets advertisers commerce company legal publishers resources signup login solutions technology dist/
          cp index.html sitemap.html logo_MCV_network.png dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-site
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to mcv.network
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: marketing-site
          path: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 5
          curl -fsS https://mcv.network/health
