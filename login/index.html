<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — MCV Network</title>
<meta name="description" content="Log in to your MCV Network advertiser or publisher account.">
<link rel="icon" type="image/png" href="/logo_MCV_network.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/assets/css/mcv.css">
</head>
<body data-nav="">
<div id="mcv-nav"></div>
<div class="auth-wrap">
    <div class="auth-side">
      <h2>Performance Advertising at Scale</h2>
      <p>Beyond walled gardens — reach millions across the open web.</p>
      <ul class="checklist"><li>600M+ daily active users</li><li>AI targeting &amp; first-party data</li><li>Real-time ROAS reporting</li><li>Start from just $100</li></ul>
    </div>
    <div class="auth-form"><div class="auth-form-inner">
    <h1>Welcome back</h1>
    <p class="sub">Log in to your MCV Network dashboard.</p>
    <form onsubmit="event.preventDefault(); window.location.href='https://ads.mcv.network';">
      
      <div class="form-field"><label>Work email</label><input type="email" required></div>
      <div class="form-field"><label>Password</label><input type="password" required></div>
      
      <button class="btn btn-primary" type="submit">Log In <i class="fa-solid fa-arrow-right"></i></button>
    </form>
    <p class="auth-alt">New to MCV? <a href="/signup/">Create an account</a></p>
  </div></div>
  </div>
<div id="mcv-footer"></div>
<script src="/assets/js/mcv.js"></script>
</body>
</html>
